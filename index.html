<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Track Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1a2332;
    --cream:#f5f0e6;
    --amber:#e8a04c;
    --taxiway:#5b8a9a;
    --panel:#3d4f5c;
    --red:#d9534f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100vh;overflow:hidden;font-family:'Space Mono',monospace;background:var(--navy);color:var(--cream);}
  body{ display:flex; flex-direction:column; overflow:hidden; min-height:0; }

  /* ===== Header ===== */
  header{
    position:relative;
    flex:0 0 auto;
    padding:24px 32px 20px;
    background:linear-gradient(180deg, var(--navy) 0%, #141b27 100%);
    border-bottom:1px solid rgba(232,160,76,0.25);
    z-index:30;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:6px;
  }
  h1{
    font-family:'Bitter',serif;
    font-weight:800;
    font-size:clamp(26px,4.5vw,42px);
    letter-spacing:-0.01em;
    line-height:1.05;
  }
  h1 .tail{color:var(--amber);}
  .meta-row{
    display:flex;
    gap:28px;
    margin-top:14px;
    flex-wrap:wrap;
    align-items:flex-end;
  }
  .meta-item{ display:flex; flex-direction:column; gap:2px; min-height:36px; }
  .meta-label{
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--taxiway);
    opacity:0.85;
  }
  .meta-value{ font-size:15px; font-weight:700; color:var(--cream); }
  .meta-value.empty{ color:var(--panel); font-weight:400; }

  /* ===== Upload control ===== */
  .upload-area{
    margin-left:auto;
  }
  .upload-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:11px 20px;
    border:1.5px dashed rgba(232,160,76,0.5);
    border-radius:6px;
    background:rgba(232,160,76,0.06);
    color:var(--amber);
    font-family:'Space Mono',monospace;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all 0.15s ease;
    white-space:nowrap;
  }
  .upload-btn:hover{ background:rgba(232,160,76,0.14); border-color:var(--amber); }
  .upload-btn svg{ width:16px; height:16px; fill:var(--amber); flex-shrink:0; }
  .upload-btn input{ display:none; }
  .file-name{
    font-size:11px;
    color:var(--taxiway);
    margin-top:6px;
    max-width:220px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  /* ===== Main layout ===== */
  main{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }
  #map{
    position:absolute;
    inset:0;
    background:#2a3441;
  }
  #space-viewer{
    position:absolute;
    inset:0;
    z-index:2;
    display:none;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 50% 35%, #33465a 0%, #101721 58%, #080d14 100%);
    cursor:grab;
  }
  #space-viewer:active{ cursor:grabbing; }
  body[data-view-mode="space"] #space-viewer{ display:block; }
  body[data-view-mode="space"] #map{ visibility:hidden; }
  .leaflet-tile-pane{ filter: saturate(0.55) brightness(0.85) contrast(1.05); }
  .leaflet-container{ background:#2a3441; font-family:'Space Mono',monospace; }

  /* ===== Empty state ===== */
  .empty-state{
    position:absolute;
    inset:0;
    z-index:15;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#2a3441;
    padding:24px;
  }
  .empty-state.hidden{ display:none; }
  .empty-inner{ max-width:420px; }
  .empty-inner h2{
    font-family:'Bitter',serif;
    font-size:24px;
    font-weight:800;
    margin-bottom:10px;
    color:var(--cream);
  }
  .empty-inner p{
    font-size:13px;
    line-height:1.7;
    color:var(--taxiway);
    margin-bottom:22px;
  }
  .empty-inner .upload-btn{ font-size:13px; padding:14px 28px; }
  .empty-error{
    margin-top:18px;
    color:var(--red);
    font-size:12px;
    line-height:1.6;
    display:none;
  }

  /* ===== Instrument panel ===== */
  .panel{
    position:fixed;
    left:50%;
    bottom:48px;
    transform:translateX(-50%);
    z-index:1000;
    background:rgba(26,35,50,0.92);
    backdrop-filter:blur(8px);
    border:1px solid rgba(232,160,76,0.3);
    border-radius:8px;
    padding:18px 22px;
    display:flex;
    align-items:center;
    gap:24px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    width:min(820px, calc(100vw - 48px));
    max-width:calc(100vw - 48px);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .panel.visible{ opacity:1; pointer-events:all; }

  .gauge-wrap{ position:relative; width:96px; height:96px; flex-shrink:0; }
  .gauge-wrap svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .gauge-track{ fill:none; stroke:var(--panel); stroke-width:6; }
  .gauge-fill{ fill:none; stroke:var(--amber); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 0.15s linear; }
  .gauge-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  .gauge-center .val{ font-size:20px; font-weight:700; color:var(--cream); line-height:1; }
  .gauge-center .unit{ font-size:9px; letter-spacing:0.15em; color:var(--taxiway); margin-top:3px; text-transform:uppercase; }

  .readouts{ display:grid; grid-template-columns:repeat(3, auto); gap:4px 28px; }
  .readout{ display:flex; flex-direction:column; gap:2px; }
  .readout .rlabel{ font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--taxiway); }
  .readout .rval{ font-size:18px; font-weight:700; color:var(--cream); }
  .readout .rval .small{ font-size:11px; color:var(--taxiway); font-weight:400; }

  /* ===== Scrubber ===== */
  .scrubber-wrap{
    position:fixed;
    left:24px;
    right:24px;
    bottom:18px;
    z-index:1000;
    padding:0;
    background:none;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.25s ease;
  }
  .scrubber-wrap.visible{ opacity:1; pointer-events:all; }
  input[type=range]{
    width:100%; -webkit-appearance:none; appearance:none;
    height:4px; background:var(--panel); border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--amber); border:3px solid var(--navy);
    box-shadow:0 0 0 1px rgba(232,160,76,0.4), 0 2px 8px rgba(0,0,0,0.5);
    cursor:pointer; margin-top:-7px;
  }
  input[type=range]::-moz-range-thumb{
    width:18px; height:18px; border-radius:50%;
    background:var(--amber); border:3px solid var(--navy); cursor:pointer;
  }

  /* ===== Legend ===== */
  .legend{
    position:absolute; top:18px; right:18px; z-index:10;
    background:rgba(26,35,50,0.92);
    backdrop-filter:blur(8px);
    border:1px solid rgba(232,160,76,0.3);
    border-radius:8px;
    padding:12px 16px;
    font-size:11px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .legend.visible{ opacity:1; }
  .legend .ltitle{ letter-spacing:0.18em; text-transform:uppercase; color:var(--taxiway); margin-bottom:8px; font-size:10px;}
  .gradient-bar{ width:140px; height:8px; border-radius:4px; background:linear-gradient(90deg, #5b8a9a, #e8a04c, #d9534f); margin-bottom:4px; }
  .gradient-labels{ display:flex; justify-content:space-between; color:var(--cream); opacity:0.8; }

  /* ===== 2D / 3D view toggle ===== */
  .view-toggle{
    position:absolute;
    top:14px;
    left:18px;
    z-index:1001;
    display:flex;
    gap:4px;
    padding:5px;
    border-radius:999px;
    background:rgba(26,35,50,0.78);
    border:1px solid rgba(232,160,76,0.25);
    backdrop-filter:blur(8px);
    box-shadow:0 6px 24px rgba(0,0,0,0.24);
  }
  .view-mode-btn{
    border:0;
    border-radius:999px;
    padding:7px 11px;
    background:transparent;
    color:var(--taxiway);
    font-family:'Space Mono',monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background 0.15s ease, color 0.15s ease;
  }
  .view-mode-btn.active{
    background:rgba(232,160,76,0.16);
    color:var(--amber);
  }
  body[data-map-theme="white"] .view-toggle{
    background:rgba(245,240,230,0.78);
    border-color:rgba(26,35,50,0.16);
  }

  /* ===== Compact map theme picker ===== */
  .theme-picker{
    position:absolute;
    top:68px;
    right:18px;
    left:auto;
    z-index:1000;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    padding:7px;
    border-radius:999px;
    background:rgba(26,35,50,0.72);
    border:1px solid rgba(232,160,76,0.25);
    backdrop-filter:blur(8px);
    box-shadow:0 4px 18px rgba(0,0,0,0.22);
  }
  .theme-dot{
    width:20px;
    height:20px;
    border-radius:999px;
    border:2px solid rgba(245,240,230,0.45);
    cursor:pointer;
    transition:transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .theme-dot:hover{ transform:scale(1.12); }
  .theme-dot.active{
    border-color:var(--amber);
    box-shadow:0 0 0 3px rgba(232,160,76,0.28);
  }
  .theme-dot-dark{ background:#1a2332; }
  .theme-dot-white{ background:#f5f0e6; border-color:rgba(26,35,50,0.35); }
  .theme-dot-night{ background:#44515e; }

  body[data-map-theme="white"] .theme-picker{
    background:rgba(245,240,230,0.72);
    border-color:rgba(26,35,50,0.18);
  }

  /* ===== Panel controls ===== */
  .panel-actions{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }

  .panel-icon-btn{
    width:44px;
    height:44px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,0.35);
    transition:transform 0.15s ease, opacity 0.25s ease, background 0.15s ease;
    opacity:0;
    pointer-events:none;
  }
  .panel-icon-btn.visible{ opacity:1; pointer-events:all; }
  .panel-icon-btn:hover{ transform:scale(1.06); }
  .panel-icon-btn:active{ transform:scale(0.97); }
  .panel-icon-btn svg{ width:20px; height:20px; flex-shrink:0; }

  .play-btn{
    background:var(--amber);
    border:none;
  }
  .play-btn svg{ fill:var(--navy); }

  .fit-track-btn{
    border:1px solid rgba(232,160,76,0.45);
    background:rgba(61,79,92,0.42);
    color:var(--amber);
  }
  .fit-track-btn:hover{ background:rgba(232,160,76,0.10); }
  .fit-track-btn svg{ fill:none; stroke:var(--amber); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }



  /* ===== Compact export controls ===== */
  .export-bar{
    position:absolute;
    top:14px;
    right:18px;
    left:auto;
    bottom:auto;
    z-index:1001;
    display:flex;
    align-items:center;
    gap:8px;
    padding:7px;
    border-radius:999px;
    background:rgba(26,35,50,0.82);
    border:1px solid rgba(232,160,76,0.28);
    backdrop-filter:blur(8px);
    box-shadow:0 6px 24px rgba(0,0,0,0.28);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .export-bar.visible{ opacity:1; pointer-events:all; }
  .export-label{
    padding:0 6px 0 8px;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--taxiway);
  }
  .export-btn{
    border:1px solid rgba(232,160,76,0.35);
    background:rgba(232,160,76,0.08);
    color:var(--cream);
    border-radius:999px;
    padding:8px 12px;
    font-family:'Space Mono',monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }
  .export-btn:hover{
    background:rgba(232,160,76,0.16);
    border-color:rgba(232,160,76,0.65);
    transform:translateY(-1px);
  }
  body[data-map-theme="white"] .export-bar{
    background:rgba(245,240,230,0.86);
    border-color:rgba(26,35,50,0.16);
    box-shadow:0 6px 24px rgba(26,35,50,0.16);
  }
  body[data-map-theme="white"] .export-btn{ color:var(--navy); }

  /* spinner for loading */
  .spinner{
    width:28px; height:28px;
    border:3px solid var(--panel);
    border-top-color:var(--amber);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    display:none;
    margin:0 auto 14px;
  }
  .spinner.visible{ display:block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  @media (max-width:640px){
    header{padding:18px 18px 16px;}
    .meta-row{gap:14px;}
    .upload-area{ margin-left:0; width:100%; margin-top:10px; }
    .upload-btn{ width:100%; justify-content:center; }
    .panel{
      left:50%;
      right:auto;
      bottom:124px;
      transform:translateX(-50%);
      width:calc(100vw - 24px);
      max-width:calc(100vw - 24px);
      flex-direction:column; align-items:flex-start; gap:14px; padding:14px 16px;
    }
    .readouts{grid-template-columns:repeat(3,1fr); gap:10px;}
    .legend{ top:auto; bottom:64px; right:12px; left:12px; }
    .theme-picker{ top:12px; right:12px; left:auto; padding:6px; gap:6px; }
    .theme-dot{ width:20px; height:20px; }
    .scrubber-wrap{
      left:50%;
      right:auto;
      bottom:102px;
      transform:translateX(-50%);
      width:calc(100vw - 24px);
    }
    .play-btn{ left:12px; right:12px; bottom:12px; }
    .fit-track-btn{ left:12px; right:12px; bottom:68px; }
    .export-bar{ top:12px; right:12px; left:auto; bottom:auto; justify-content:center; }
  }

  @media (prefers-reduced-motion: reduce){
    .gauge-fill{ transition:none; }
    .panel-icon-btn{ transition:none; }
  }

  /* ===== Tabs ===== */
  .tabs{
    display:flex;
    gap:8px;
    margin-top:16px;
  }
  .tab-btn{
    font-family:'Space Mono',monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--taxiway);
    background:transparent;
    border:1px solid var(--panel);
    border-radius:6px;
    padding:8px 16px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .tab-btn.active{
    color:var(--amber);
    border-color:rgba(232,160,76,0.5);
    background:rgba(232,160,76,0.08);
  }
  .tab-btn:hover{ color:var(--cream); }

  .view{ display:none; }
  .view.active{ display:flex; flex-direction:column; flex:1 1 auto; min-height:0; }

  /* ===== Batch export view ===== */
  #batch-view{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    padding:40px 32px;
  }
  .batch-wrap{ max-width:680px; margin:0 auto; }

  .format-select{
    margin-bottom:24px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .format-label{
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--taxiway);
    margin-bottom:4px;
  }
  .format-option{
    display:flex;
    flex-direction:column;
    gap:2px;
    padding:12px 16px;
    border:1px solid var(--panel);
    border-radius:6px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .format-option:has(input:checked){
    border-color:rgba(232,160,76,0.5);
    background:rgba(232,160,76,0.06);
  }
  .format-option input{
    position:absolute;
    opacity:0;
    pointer-events:none;
  }
  .format-option .fo-title{
    font-size:13px;
    font-weight:700;
    color:var(--cream);
  }
  .format-option:has(input:checked) .fo-title{ color:var(--amber); }
  .format-option .fo-desc{
    font-size:11px;
    color:var(--taxiway);
  }
  .batch-drop{
    border:2px dashed rgba(232,160,76,0.35);
    border-radius:10px;
    padding:48px 24px;
    text-align:center;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .batch-drop:hover, .batch-drop.dragover{
    border-color:var(--amber);
    background:rgba(232,160,76,0.06);
  }
  .batch-drop input{ display:none; }
  .batch-drop h3{
    font-family:'Bitter',serif;
    font-size:20px;
    font-weight:800;
    margin-bottom:8px;
    color:var(--cream);
  }
  .batch-drop p{
    font-size:12px;
    color:var(--taxiway);
    line-height:1.6;
  }
  .batch-drop svg{
    width:36px; height:36px;
    fill:var(--amber);
    margin-bottom:14px;
  }

  .batch-list{
    margin-top:24px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .batch-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:12px 16px;
    background:rgba(61,79,92,0.25);
    border:1px solid var(--panel);
    border-radius:6px;
    font-size:12px;
  }
  .batch-item .bi-name{
    font-weight:700;
    color:var(--cream);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .batch-item .bi-status{
    flex-shrink:0;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .batch-item .bi-status.ok{ color:#7fb685; }
  .batch-item .bi-status.err{ color:var(--red); }
  .batch-item .bi-status.pending{ color:var(--taxiway); }
  .batch-item .bi-detail{
    font-size:11px;
    color:var(--taxiway);
    flex-shrink:0;
  }

  .batch-actions{
    margin-top:24px;
    display:flex;
    gap:12px;
    align-items:center;
  }
  .download-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:13px 24px;
    border:none;
    border-radius:6px;
    background:var(--amber);
    color:var(--navy);
    font-family:'Space Mono',monospace;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
    cursor:pointer;
    transition:transform 0.15s ease;
  }
  .download-btn:hover{ transform:scale(1.03); }
  .download-btn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
  .download-btn svg{ width:16px; height:16px; fill:var(--navy); }
  .batch-summary{ font-size:12px; color:var(--taxiway); }

  @media (max-width:640px){
    #batch-view{ padding:24px 16px; }
    .batch-drop{ padding:32px 16px; }
  }


  /* ===== Balanced top panel: calmer spacing without taking too much map room ===== */
  header{
    padding:14px 28px 12px;
    display:grid;
    grid-template-columns:minmax(230px, 0.9fr) minmax(360px, 1.4fr) auto;
    grid-template-areas:
      "title meta controls"
      "tabs tabs tabs";
    column-gap:28px;
    row-gap:12px;
    align-items:center;
  }
  .eyebrow{
    display:none;
  }
  h1{
    grid-area:title;
    font-size:clamp(19px,2.25vw,29px);
    line-height:1.05;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }
  .meta-row{
    grid-area:meta;
    margin-top:0;
    gap:24px;
    align-items:center;
    justify-content:center;
    flex-wrap:nowrap;
    min-width:0;
  }
  .meta-item{
    min-height:0;
    gap:1px;
  }
  .meta-label{
    font-size:9.5px;

<script>
// ===========================================================================
// State
// ===========================================================================
let FLIGHT = [];       // [lat, lon, alt_ft, speed_kt, course_deg, isoTimestamp]
let polylines = [];
let marker = null;
let altMin = 0, altMax = 0;
let trackBounds = null;
let currentTailNumber = null;
let currentViewMode = 'map';
let spaceView = null;

const MAP_THEMES = {
  dark: {
    label: 'Original Dark',
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    filter: 'saturate(0.55) brightness(0.85) contrast(1.05)',
    mapBg: '#2a3441',
    route: 'bordered',
    casing: '#f5f0e6',
    casingOpacity: 0.34
  },
  white: {
    label: 'White',
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    filter: 'saturate(0.72) brightness(1.06) contrast(0.94)',
    mapBg: '#e9e5dc',
    route: 'bordered',
    casing: '#1a2332',
    casingOpacity: 0.55
  },
  night: {
    label: 'Option A',
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    filter: 'saturate(0.75) brightness(1.25) contrast(0.9)',
    mapBg: '#44515e',
    route: 'bordered',
    casing: '#1a2332',
    casingOpacity: 0.58
  }
};
const THEME_ORDER = ['dark', 'white', 'night'];
let currentMapTheme = 'dark';
document.body.dataset.viewMode = currentViewMode;

const map = L.map('map', { zoomControl: true, attributionControl: true, center:[39.8,-98.5], zoom: 4 });
window.addEventListener('resize', () => map.invalidateSize());
setTimeout(() => map.invalidateSize(), 100);
const tileLayer = L.tileLayer(MAP_THEMES[currentMapTheme].url, {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18
}).addTo(map);

// ===========================================================================
// 2D / 3D view mode
// ===========================================================================
function applyViewMode(mode){
  currentViewMode = mode === 'space' ? 'space' : 'map';
  document.body.dataset.viewMode = currentViewMode;
  document.querySelectorAll('.view-mode-btn').forEach(btn => {
    const isActive = btn.dataset.viewMode === currentViewMode;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });

  if (currentViewMode === 'space') {
    initSpaceView();
    buildSpaceTrack();
    if (FLIGHT.length) update(parseInt(scrubber.value || 0));
  } else {
    map.invalidateSize();
  }
}

function initSpaceView(){
  if (spaceView || !window.THREE) return;
  const canvas = document.getElementById('space-viewer');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x080d14, 18, 42);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
  const group = new THREE.Group();
  scene.add(group);

  const hemi = new THREE.HemisphereLight(0xf5f0e6, 0x1a2332, 1.0);
  scene.add(hemi);
  const key = new THREE.DirectionalLight(0xe8a04c, 0.8);
  key.position.set(6, 12, 8);
  scene.add(key);

  spaceView = {
    canvas, renderer, scene, camera, group,
    yaw:-0.72, pitch:0.72, distance:24,
    target:new THREE.Vector3(0,3,0),
    converter:null, aircraft:null,
    isDragging:false, lastX:0, lastY:0
  };

  const resize = () => {
    const w = canvas.clientWidth || canvas.parentElement.clientWidth;
    const h = canvas.clientHeight || canvas.parentElement.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / Math.max(1, h);
    camera.updateProjectionMatrix();
    renderSpaceView();
  };
  window.addEventListener('resize', resize);
  resize();

  canvas.addEventListener('pointerdown', e => {
    spaceView.isDragging = true;
    spaceView.lastX = e.clientX;
    spaceView.lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!spaceView.isDragging) return;
    const dx = e.clientX - spaceView.lastX;
    const dy = e.clientY - spaceView.lastY;
    spaceView.lastX = e.clientX;
    spaceView.lastY = e.clientY;
    spaceView.yaw -= dx * 0.006;
    spaceView.pitch = Math.max(0.18, Math.min(1.35, spaceView.pitch + dy * 0.006));
    renderSpaceView();
  });
  canvas.addEventListener('pointerup', () => { spaceView.isDragging = false; });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    spaceView.distance = Math.max(9, Math.min(55, spaceView.distance + e.deltaY * 0.018));
    renderSpaceView();
  }, { passive:false });

  renderSpaceView();
}

function renderSpaceView(){
  if (!spaceView) return;
  const { camera, renderer, scene, target, yaw, pitch, distance } = spaceView;
  camera.position.set(
    target.x + Math.cos(yaw) * Math.cos(pitch) * distance,
    target.y + Math.sin(pitch) * distance,
    target.z + Math.sin(yaw) * Math.cos(pitch) * distance
  );
  camera.lookAt(target);
  renderer.render(scene, camera);
}

function resetSpaceCamera(){
  if (!spaceView) return;
  spaceView.yaw = -0.72;
  spaceView.pitch = 0.72;
  spaceView.distance = 24;
  renderSpaceView();
}

function clearSpaceGroup(){
  if (!spaceView) return;
  while (spaceView.group.children.length) {
    const obj = spaceView.group.children.pop();
    obj.traverse?.(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
  }
  spaceView.aircraft = null;
  spaceView.converter = null;
}

function makeCylinderBetween(a, b, radius, color, opacity=1){
  const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = dir.length();
  if (len <= 0.0001) return null;
  const geom = new THREE.CylinderGeometry(radius, radius, len, 8, 1, true);
  const mat = new THREE.MeshStandardMaterial({
    color,
    transparent: opacity < 1,
    opacity,
    roughness:0.55,
    metalness:0.08
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(mid);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  return mesh;
}

function buildSpaceTrack(){
  if (!FLIGHT.length || !window.THREE) return;
  initSpaceView();
  clearSpaceGroup();

  const group = spaceView.group;
  const lat0 = FLIGHT.reduce((s,p)=>s+p[0],0) / FLIGHT.length;
  const lon0 = FLIGHT.reduce((s,p)=>s+p[1],0) / FLIGHT.length;
  const cosLat = Math.cos(lat0 * Math.PI / 180);
  const metersPerDeg = 111320;
  const raw = FLIGHT.map(p => ({
    x:(p[1]-lon0) * metersPerDeg * cosLat,
    z:-(p[0]-lat0) * metersPerDeg,
    alt:p[2],
    lat:p[0],
    lon:p[1]
  }));
  const maxHorizontal = Math.max(1, ...raw.map(p => Math.hypot(p.x, p.z)));
  const hScale = 18 / maxHorizontal;
  const altRange = Math.max(1, altMax - altMin);
  const yScale = 7 / altRange;
  const converter = (lat, lon, alt) => new THREE.Vector3(
    (lon-lon0) * metersPerDeg * cosLat * hScale,
    0.65 + (alt - altMin) * yScale,
    -(lat-lat0) * metersPerDeg * hScale
  );
  spaceView.converter = converter;

  const grid = new THREE.GridHelper(26, 26, 0x5b8a9a, 0x263443);
  grid.material.transparent = true;
  grid.material.opacity = 0.38;
  group.add(grid);

  const sampleStep = Math.max(1, Math.ceil(FLIGHT.length / 600));
  const pts = FLIGHT.filter((_,i)=>i % sampleStep === 0 || i === FLIGHT.length-1)
    .map(p => converter(p[0], p[1], p[2]));

  for (let i=0; i<pts.length-1; i++){
    const casing = makeCylinderBetween(pts[i], pts[i+1], 0.085, 0x0c111a, 0.78);
    if (casing) group.add(casing);
  }
  for (let i=0; i<pts.length-1; i++){
    const srcIndex = Math.min(FLIGHT.length-1, i * sampleStep);
    const avgAlt = (FLIGHT[srcIndex][2] + FLIGHT[Math.min(FLIGHT.length-1, srcIndex+sampleStep)][2]) / 2;
    const seg = makeCylinderBetween(pts[i], pts[i+1], 0.048, new THREE.Color(altColor(avgAlt)), 1);
    if (seg) group.add(seg);
  }

  const postMat = new THREE.LineBasicMaterial({ color:0x8fa4aa, transparent:true, opacity:0.24 });
  for (let i=0; i<pts.length; i += Math.max(8, Math.floor(pts.length / 45))){
    const p = pts[i];
    const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p.x,0,p.z), p]);
    group.add(new THREE.Line(geom, postMat));
  }

  const start = pts[0];
  const end = pts[pts.length-1];
  const startDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 16),
    new THREE.MeshStandardMaterial({ color:0x5b8a9a })
  );
  startDot.position.copy(start);
  group.add(startDot);

  const aircraft = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 24, 24),
    new THREE.MeshStandardMaterial({ color:0xe8a04c, emissive:0x2b1903, roughness:0.35 })
  );
  aircraft.position.copy(end);
  group.add(aircraft);
  spaceView.aircraft = aircraft;
  renderSpaceView();
}

function updateSpaceAircraft(lat, lon, alt){
  if (!spaceView || !spaceView.aircraft || !spaceView.converter) return;
  spaceView.aircraft.position.copy(spaceView.converter(lat, lon, alt));
  renderSpaceView();
}

// ===========================================================================
// Map themes
// ===========================================================================
function applyMapTheme(themeKey){
  const theme = MAP_THEMES[themeKey] || MAP_THEMES.dark;
  currentMapTheme = themeKey;
  document.body.dataset.mapTheme = themeKey;
  tileLayer.setUrl(theme.url);
  document.querySelectorAll('.leaflet-tile-pane').forEach(el => {
    el.style.filter = theme.filter;
  });
  document.getElementById('map').style.background = theme.mapBg;
  document.querySelectorAll('.leaflet-container').forEach(el => {
    el.style.background = theme.mapBg;
  });
  document.querySelectorAll('.theme-dot').forEach(btn => {
    const isActive = btn.dataset.theme === themeKey;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  });
  redrawTrackSegments();
}

function cycleMapTheme(){
  const i = THEME_ORDER.indexOf(currentMapTheme);
  const next = THEME_ORDER[(i + 1) % THEME_ORDER.length];
  applyMapTheme(next);
}

function currentRouteStyle(){
  return (MAP_THEMES[currentMapTheme] || MAP_THEMES.dark).route;
}

// ===========================================================================
// Parsers
// ===========================================================================

// --- Dispatches between FF-style (gx:Track) and FR24-style (per-point Placemarks) KML ---
function parseAnyKML(text){
  if (text.includes('<gx:Track>') || text.includes('<gx:coord>')) {
    return parseKML(text);
  }
  if (text.includes('<TimeStamp>')) {
    return parseFR24KML(text);
  }
  throw new Error('Could not find track data in this KML (no gx:Track or TimeStamp placemarks found).');
}

// --- FR24-style KML: thousands of per-point <Placemark> with <name> timestamp,
//     <description> (Altitude/Speed/Heading as HTML), <TimeStamp><when>, <Point><coordinates> ---
function parseFR24KML(text){
  const placemarks = [...text.matchAll(/<Placemark>([\s\S]*?)<\/Placemark>/g)].map(m => m[1]);

  const pts = [];
  let tailNumber = null;

  // Try to pull tail number from the Document name, e.g. "-/N445AF"
  const docName = text.match(/<name>(.*?)<\/name>/);
  if (docName) {
    const m = docName[1].match(/([A-Z]\d?-?[A-Z0-9]{3,6})$/);
    if (m) tailNumber = m[1].replace(/^-\//, '');
  }

  for (const pm of placemarks){
    const tsMatch = pm.match(/<TimeStamp>\s*<when>(.*?)<\/when>/);
    const coordMatch = pm.match(/<Point>[\s\S]*?<coordinates>(.*?)<\/coordinates>/);
    if (!tsMatch || !coordMatch) continue; // skip non-point placemarks (route lines, etc.)

    const iso = tsMatch[1].replace('+00:00', 'Z');
    const [lon, lat, alt0] = coordMatch[1].split(',').map(Number);

    let altFt = alt0 || 0;
    let speed = null, course = null;

    const descMatch = pm.match(/<description>([\s\S]*?)<\/description>/);
    if (descMatch) {
      const desc = descMatch[1];
      const altM = desc.match(/Altitude:.*?(-?\d+(?:\.\d+)?)\s*ft/);
      const spdM = desc.match(/Speed:.*?(-?\d+(?:\.\d+)?)\s*kt/);
      const hdgM = desc.match(/Heading:.*?(-?\d+(?:\.\d+)?)/);
      if (altM) altFt = parseFloat(altM[1]);
      if (spdM) speed = parseFloat(spdM[1]);
      if (hdgM) course = parseFloat(hdgM[1]);
    }

    pts.push([lat, lon, altFt, speed === null ? 0 : speed, course === null ? -1 : course, iso]);
  }

  if (pts.length === 0) throw new Error('No valid track points found in this FR24 KML.');

  // Sort by time just in case placemarks aren't in chronological order
  pts.sort((a,b) => new Date(a[5]) - new Date(b[5]));

  return { points: pts, tailNumber };
}

// --- KML parser (gx:Track with <when> + <gx:coord>, optional speed/course arrays) ---
function parseKML(text){
  const whens = [...text.matchAll(/<when>(.*?)<\/when>/g)].map(m => m[1]);
  const coords = [...text.matchAll(/<gx:coord>(.*?)<\/gx:coord>/g)].map(m => m[1]);

  if (whens.length === 0 || coords.length === 0) {
    throw new Error('No <when>/<gx:coord> track points found in this KML.');
  }

  // Optional extended-data arrays (ForeFlight/Stratus exports)
  let speedArr = null, courseArr = null, tailNumber = null;
  const schemaMatch = text.match(/<SchemaData>([\s\S]*?)<\/SchemaData>/);
  if (schemaMatch) {
    const sd = schemaMatch[1];
    const getArr = (name) => {
      const re = new RegExp(`<gx:SimpleArrayData name="${name}">([\\s\\S]*?)<\\/gx:SimpleArrayData>`);
      const m = sd.match(re);
      if (!m) return null;
      return [...m[1].matchAll(/<gx:value>(.*?)<\/gx:value>/g)].map(v => parseFloat(v[1]));
    };
    speedArr = getArr('speed_kts');
    courseArr = getArr('course');
  }
  const tailMatch = text.match(/<Data name="tailNumber">\s*<value>(.*?)<\/value>/);
  if (tailMatch && tailMatch[1].trim()) tailNumber = tailMatch[1].trim();

  const pts = [];
  let prev = null, prevTime = null;

  for (let i = 0; i < whens.length; i++){
    const when = whens[i];
    const [lon, lat, altM] = coords[i].trim().split(/\s+/).map(Number);
    const altFt = altM * 3.28084;

    const t = new Date(when);

    let speed = speedArr ? Math.max(0, speedArr[i]) : null;
    let course = courseArr ? courseArr[i] : null;

    if (speed === null || course === null) {
      // compute from consecutive points
      if (prev) {
        const dtH = (t - prevTime) / 3600000;
        const dx = haversineNM(prev[0], prev[1], lat, lon);
        if (speed === null) speed = dtH > 0 ? dx / dtH : 0;
        if (course === null || course < 0) course = bearing(prev[0], prev[1], lat, lon);
      } else {
        if (speed === null) speed = 0;
        if (course === null) course = -1;
      }
    }

    pts.push([lat, lon, altFt, speed, course, when]);
    prev = [lat, lon];
    prevTime = t;
  }
  return { points: pts, tailNumber };
}

// --- Splits a CSV line, respecting double-quoted fields (so "lat,lon" stays one field) ---
function splitCSVLine(line){
  const cells = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      cells.push(cur.trim());
      cur = '';
    } else {
      cur += ch;
    }
  }
  cells.push(cur.trim());
  return cells;
}

// --- Dispatches to the right CSV parser based on header row ---
function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length < 2) throw new Error('CSV appears to be empty.');

  let start = 0;
  while (start < lines.length && lines[start].trim().startsWith('#')) start++;

  const header = splitCSVLine(lines[start]).map(h => h.trim());

  if (header.includes('Position') && header.includes('Timestamp')) {
    return parseFR24CSV(lines, start, header);
  }
  return parseG1000CSV(lines, start, header);
}

// --- FlightRadar24-style CSV (Timestamp, UTC, Callsign, Position, Altitude, Speed, Direction) ---
function parseFR24CSV(lines, start, header){
  const col = name => header.indexOf(name);

  const iUTC = col('UTC');
  const iPos = col('Position');
  const iAlt = col('Altitude');
  const iSpd = col('Speed');
  const iDir = col('Direction');
  const iTail = col('Callsign');

  if (iUTC < 0 || iPos < 0) {
    throw new Error('CSV header is missing required columns (UTC, Position).');
  }

  const dataLines = lines.slice(start + 1).filter(l => !l.trim().startsWith('#'));
  const pts = [];
  let prev = null, prevTime = null;
  let tailNumber = null;

  for (const line of dataLines){
    const cells = splitCSVLine(line);
    const posStr = cells[iPos];
    if (!posStr || !posStr.includes(',')) continue;
    const [latStr, lonStr] = posStr.split(',');
    const lat = parseFloat(latStr);
    const lon = parseFloat(lonStr);
    if (isNaN(lat) || isNaN(lon)) continue;

    const iso = cells[iUTC];
    const t = new Date(iso);

    // Altitude here is in feet already (FlightRadar24 convention)
    const alt = iAlt >= 0 ? (parseFloat(cells[iAlt]) || 0) : 0;

    // Speed here is in knots already
    let speed = iSpd >= 0 ? parseFloat(cells[iSpd]) : null;
    let course = iDir >= 0 ? parseFloat(cells[iDir]) : null;

    if (speed === null || isNaN(speed) || course === null || isNaN(course)) {
      if (prev) {
        const dtH = (t - prevTime) / 3600000;
        const dx = haversineNM(prev[0], prev[1], lat, lon);
        if (speed === null || isNaN(speed)) speed = dtH > 0 ? dx / dtH : 0;
        if (course === null || isNaN(course)) course = bearing(prev[0], prev[1], lat, lon);
      } else {
        if (speed === null || isNaN(speed)) speed = 0;
        if (course === null || isNaN(course)) course = -1;
      }
    }

    if (!tailNumber && iTail >= 0 && cells[iTail]) tailNumber = cells[iTail];

    pts.push([lat, lon, alt, speed, course, iso]);
    prev = [lat, lon];
    prevTime = t;
  }

  if (pts.length === 0) throw new Error('No valid location rows found in CSV.');
  return { points: pts, tailNumber };
}

// --- G1000 CSV parser (handles the ForeFlight-import format) ---
function parseG1000CSV(lines, start, header){
  const col = name => header.indexOf(name);

  const iDate = col('Lcl Date');
  const iTime = col('Lcl Time');
  const iLat  = col('Latitude');
  const iLon  = col('Longitude');
  const iAlt  = col('AltMSL') >= 0 ? col('AltMSL') : col('AltGPS');
  const iSpd  = col('GndSpd') >= 0 ? col('GndSpd') : col('TAS');
  const iCrs  = col('TRK') >= 0 ? col('TRK') : col('HDG');

  if (iDate < 0 || iLat < 0 || iLon < 0) {
    throw new Error('CSV header is missing required columns (Lcl Date, Latitude, Longitude).');
  }

  const dataLines = lines.slice(start + 1).filter(l => !l.trim().startsWith('#'));

  const pts = [];
  let prev = null, prevTime = null;

  for (const line of dataLines){
    const cells = splitCSVLine(line);
    const lat = parseFloat(cells[iLat]);
    const lon = parseFloat(cells[iLon]);
    if (isNaN(lat) || isNaN(lon)) continue; // skip rows w/o location

    const date = cells[iDate];
    const time = cells[iTime] || '00:00:00';
    const alt = iAlt >= 0 ? parseFloat(cells[iAlt]) || 0 : 0;

    let speed = iSpd >= 0 ? parseFloat(cells[iSpd]) : null;
    let course = iCrs >= 0 ? parseFloat(cells[iCrs]) : null;

    const iso = `${date}T${time}Z`;
    const t = new Date(iso);

    if (speed === null || isNaN(speed) || course === null || isNaN(course)) {
      if (prev) {
        const dtH = (t - prevTime) / 3600000;
        const dx = haversineNM(prev[0], prev[1], lat, lon);
        if (speed === null || isNaN(speed)) speed = dtH > 0 ? dx / dtH : 0;
        if (course === null || isNaN(course)) course = bearing(prev[0], prev[1], lat, lon);
      } else {
        if (speed === null || isNaN(speed)) speed = 0;
        if (course === null || isNaN(course)) course = -1;
      }
    }

    pts.push([lat, lon, alt, speed, course, iso]);
    prev = [lat, lon];
    prevTime = t;
  }

  if (pts.length === 0) throw new Error('No valid location rows found in CSV.');
  return { points: pts, tailNumber: null };
}

// --- Geometry helpers ---
function haversineNM(lat1, lon1, lat2, lon2){
  const R = 3440.065; // nm
  const p = Math.PI/180;
  const a = Math.sin((lat2-lat1)*p/2)**2 + Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin((lon2-lon1)*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function bearing(lat1, lon1, lat2, lon2){
  const p = Math.PI/180;
  const dLon = (lon2-lon1)*p;
  const x = Math.sin(dLon)*Math.cos(lat2*p);
  const y = Math.cos(lat1*p)*Math.sin(lat2*p) - Math.sin(lat1*p)*Math.cos(lat2*p)*Math.cos(dLon);
  return (Math.atan2(x,y)*180/Math.PI + 360) % 360;
}

// ===========================================================================
// Rendering
// ===========================================================================
function altColor(alt){
  const t = (alt - altMin) / ((altMax - altMin) || 1);
  if (t < 0.5) return lerpColor('#5b8a9a', '#e8a04c', t / 0.5);
  return lerpColor('#e8a04c', '#d9534f', (t - 0.5) / 0.5);
}
function lerpColor(a, b, t){
  const ah = a.match(/\w\w/g).map(x=>parseInt(x,16));
  const bh = b.match(/\w\w/g).map(x=>parseInt(x,16));
  const rh = ah.map((c,i)=>Math.round(c + (bh[i]-c)*Math.max(0,Math.min(1,t))));
  return '#' + rh.map(c=>c.toString(16).padStart(2,'0')).join('');
}

function clearTrack(){
  polylines.forEach(p => map.removeLayer(p));
  polylines = [];
  if (marker) { map.removeLayer(marker); marker = null; }
  trackBounds = null;
  clearSpaceGroup();
}

function redrawTrackSegments(){
  polylines.forEach(p => map.removeLayer(p));
  polylines = [];
  if (!FLIGHT.length) return;

  const theme = MAP_THEMES[currentMapTheme] || MAP_THEMES.dark;
  const fullPath = FLIGHT.map(p => [p[0], p[1]]);

  // One continuous casing behind the color segments keeps the border solid.
  const casing = L.polyline(fullPath, {
    color: theme.casing || '#1a2332',
    weight: 8,
    opacity: theme.casingOpacity ?? 0.55,
    lineCap: 'round',
    lineJoin: 'round'
  }).addTo(map);
  polylines.push(casing);

  // Colored altitude segments sit on top of the casing.
  for (let i = 0; i < FLIGHT.length - 1; i++){
    const a = FLIGHT[i], b = FLIGHT[i+1];
    const avgAlt = (a[2]+b[2])/2;
    const latlngs = [[a[0],a[1]],[b[0],b[1]]];

    const line = L.polyline(latlngs, {
      color: altColor(avgAlt),
      weight: 4,
      opacity: 0.96,
      lineCap: 'butt',
      lineJoin: 'round'
    }).addTo(map);
    polylines.push(line);
  }
}
function fitTrackToView(){
  if (currentViewMode === 'space') {
    resetSpaceCamera();
    return;
  }
  if (!trackBounds) return;
  map.invalidateSize();
  map.fitBounds(trackBounds, {
    paddingTopLeft: [48, 48],
    paddingBottomRight: [48, 180]
  });
}

function renderTrack(points, tailNumber){
  clearTrack();
  FLIGHT = points;
  currentTailNumber = tailNumber || null;

  const alts = FLIGHT.map(p => p[2]);
  altMin = Math.min(...alts);
  altMax = Math.max(...alts);
  document.getElementById('alt-min').textContent = Math.round(altMin);
  document.getElementById('alt-max').textContent = Math.round(altMax);

  const bounds = [];
  for (let i = 0; i < FLIGHT.length; i++){
    bounds.push([FLIGHT[i][0], FLIGHT[i][1]]);
  }
  redrawTrackSegments();
  trackBounds = L.latLngBounds(bounds);
  fitTrackToView();

  const planeIcon = L.divIcon({
    className: 'plane-icon',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:#e8a04c;border:2px solid #1a2332;box-shadow:0 0 0 4px rgba(232,160,76,0.25);"></div>',
    iconSize: [14,14], iconAnchor: [7,7]
  });
  marker = L.marker([FLIGHT[0][0], FLIGHT[0][1]], { icon: planeIcon }).addTo(map);

  const scrubber = document.getElementById('scrubber');
  scrubber.max = FLIGHT.length - 1;
  scrubber.value = 0;

  // header meta
  const first = FLIGHT[0], last = FLIGHT[FLIGHT.length-1];
  const t0 = new Date(first[5]), t1 = new Date(last[5]);
  const dateStr = t0.toISOString().slice(0,10);
  const depStr = first[5].split('T')[1].replace('Z','').split('.')[0];
  const arrStr = last[5].split('T')[1].replace('Z','').split('.')[0];

  const durMin = Math.round((t1 - t0) / 60000);
  const h = Math.floor(durMin/60), m = durMin % 60;
  const durStr = `${h}h ${m}m`;

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const titleDate = `${monthNames[t0.getUTCMonth()]} ${t0.getUTCDate()}, ${t0.getUTCFullYear()}`;
  const suffix = tailNumber ? `${tailNumber} · ${durStr}` : durStr;
  document.getElementById('title').innerHTML = `${titleDate} — <span class="tail">${suffix}</span>`;
  setMeta('m-date', dateStr);
  setMeta('m-dep', depStr);
  setMeta('m-arr', arrStr);
  setMeta('m-dur', durStr);

  // show controls
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('panel').classList.add('visible');
  document.getElementById('scrubber-wrap').classList.add('visible');
  document.getElementById('legend').classList.add('visible');
  document.getElementById('play').classList.add('visible');
  document.getElementById('fit-track').classList.add('visible');
  document.getElementById('export-bar').classList.add('visible');

  if (currentViewMode === 'space') buildSpaceTrack();
  update(0);
}

function setMeta(id, val){
  const el = document.getElementById(id);
  el.textContent = val;
  el.classList.remove('empty');
}

// ===========================================================================
// Scrubber / readouts
// ===========================================================================
const scrubber = document.getElementById('scrubber');
const gauge = document.getElementById('gauge');
const CIRC = 2 * Math.PI * 42;
gauge.setAttribute('stroke-dasharray', CIRC.toFixed(1));

function update(idx){
  if (!FLIGHT.length) return;
  const p = FLIGHT[idx];
  const [lat, lon, alt, speed, course, ts] = p;

  if (marker) marker.setLatLng([lat, lon]);
  updateSpaceAircraft(lat, lon, alt);

  const timeStr = ts.split('T')[1].replace('Z','').split('.')[0];
  document.getElementById('r-time').textContent = timeStr;
  document.getElementById('r-alt').innerHTML = Math.round(alt) + ' <span class="small">ft</span>';
  document.getElementById('r-speed').innerHTML = Math.max(0,speed).toFixed(0) + ' <span class="small">kt</span>';
  const crs = (course === null || course < 0) ? '—' : Math.round(course);
  document.getElementById('r-course').innerHTML = crs + ' <span class="small">°</span>';
  document.getElementById('r-lat').textContent = lat.toFixed(4) + '°';
  document.getElementById('r-lon').textContent = lon.toFixed(4) + '°';

  const pct = idx / (FLIGHT.length - 1);
  gauge.setAttribute('stroke-dashoffset', (CIRC * (1 - pct)).toFixed(1));
  document.getElementById('gauge-val').textContent = Math.round(pct*100) + '%';
}

scrubber.addEventListener('input', e => {
  stopPlay();
  update(parseInt(e.target.value));
});

function stopPlay(){

  playIcon.style.display = '';
  pauseIcon.style.display = 'none';

  if (!FLIGHT.length) return;

    scrubber.value = idx;
    update(idx);
  }, 40);
}

// Export current track
// ===========================================================================
const G1000_HEADER =
  ' Lcl Date, Lcl Time, UTCOfst, AtvWpt,     Latitude,    Longitude,    AltB, ' +
  'BaroA,  AltMSL,   OAT,    IAS, GndSpd,    VSpd,  Pitch,   Roll,  LatAc, ' +
  'NormAc,   HDG,   TRK, volt1,  FQtyL,  FQtyR, E1 FFlow, E1 FPres, E1 OilT, ' +
  'E1 OilP, E1 MAP, E1 RPM, E1 CHT1, E1 CHT2, E1 CHT3, E1 CHT4, E1 EGT1, ' +
  'E1 EGT2, E1 EGT3, E1 EGT4,  AltGPS, TAS, HSIS,    CRS,   NAV1,   NAV2,    ' +
  'COM1,    COM2,   HCDI,   VCDI, WndSpd, WndDr, WptDst, WptBrg, MagVar, ' +
  'AfcsOn, RollM, PitchM, RollC, PichC, VSpdG, GPSfix,  HAL,   VAL, HPLwas, ' +
  'HPLfd, VPLwas';
const G1000_TAIL =
  ', , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , , ';

function padLeft(val, width){
  const s = String(val);
  return s.length >= width ? s : ' '.repeat(width - s.length) + s;
}

function exportBaseName(){
  const raw = (document.getElementById('file-name').textContent || currentTailNumber || 'flight_track')
    .replace(/\.(kml|csv|txt)$/i, '');
  return raw.replace(/[^a-zA-Z0-9_.-]+/g, '_') || 'flight_track';
}

function downloadText(filename, content, mimeType){
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function toG1000CSV(points){
  const rows = [G1000_HEADER];
  for (const p of points){
    const [lat, lon, alt, speed, , iso] = p;
    const cleaned = iso.replace('Z','');
    const [date, timeFull = '00:00:00'] = cleaned.split('T');
    const time = timeFull.split('.')[0];

    const row = `${date}, ${time}, 00:00, , ` +
      `${padLeft(lat.toFixed(6), 12)}, ${padLeft(lon.toFixed(6), 12)}, , , ` +
      `${padLeft(Math.round(alt), 7)}, , , ${padLeft(Math.round(Math.max(0,speed)), 6)}` +
      G1000_TAIL;
    rows.push(row);
  }
  return rows.join('\n');
}

function toCleanKML(points, tailNumber){
  const whenCoordLines = points.map(p => {
    const [lat, lon, altFt] = p;
    const altM = altFt / 3.28084;
    return `                <when>${p[5]}</when>\n                <gx:coord>${lon.toFixed(6)} ${lat.toFixed(6)} ${altM.toFixed(1)}</gx:coord>`;
  }).join('\n                \n');

  const speedValues = points.map(p => `                    <gx:value>${Math.max(0,p[3]).toFixed(2)}</gx:value>`).join('\n                    \n');
  const courseValues = points.map(p => `                    <gx:value>${p[4].toFixed(2)}</gx:value>`).join('\n                    \n');
  const first = points[0];
  const tail = tailNumber || '';

  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2" xmlns:gx="http://www.google.com/kml/ext/2.2">
  <Document>
    <open>1</open>
    <visibility>1</visibility>
    <Style id="trackStyle">
      <LineStyle>
        <color>ffDB9034</color>
        <width>4</width>
      </LineStyle>
    </Style>
    <Placemark>
      <name>${tail}</name>
      <styleUrl>#trackStyle</styleUrl>
      <gx:Track>
        <altitudeMode>absolute</altitudeMode>
        <gx:interpolate>1</gx:interpolate>
${whenCoordLines}
        <ExtendedData>
          <SchemaData>
            <gx:SimpleArrayData name="speed_kts">
${speedValues}
            </gx:SimpleArrayData>
            <gx:SimpleArrayData name="course">
${courseValues}
            </gx:SimpleArrayData>
          </SchemaData>
        </ExtendedData>
      </gx:Track>
    </Placemark>
    <Placemark>
      <name>Start</name>
      <Point>
        <coordinates>${first[1].toFixed(6)},${first[0].toFixed(6)},${(first[2]/3.28084).toFixed(1)}</coordinates>
      </Point>
    </Placemark>
    <ExtendedData>
      <Data name="source"><value>Flight Track Viewer</value></Data>
      <Data name="tailNumber"><value>${tail}</value></Data>
    </ExtendedData>
  </Document>
</kml>\n`;
}

function exportCurrentTrack(format){
  if (!FLIGHT.length) return;
  const base = exportBaseName();
  if (format === 'kml') {
    downloadText(`${base}_track.kml`, toCleanKML(FLIGHT, currentTailNumber), 'application/vnd.google-earth.kml+xml;charset=utf-8');
  } else if (format === 'g1000') {
    downloadText(`${base}_G1000.csv`, toG1000CSV(FLIGHT), 'text/csv;charset=utf-8');
  }
}

document.getElementById('export-kml').addEventListener('click', () => exportCurrentTrack('kml'));
document.getElementById('export-g1000').addEventListener('click', () => exportCurrentTrack('g1000'));

  document.getElementById('spinner').classList.add('visible');
  document.getElementById('empty-title').textContent = 'Loading…';
  document.getElementById('empty-text').style.display = 'none';

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const name = file.name.toLowerCase();
    try {
      let result;
      if (name.endsWith('.kml')) {
        result = parseAnyKML(text);
      } else if (name.endsWith('.csv') || name.endsWith('.txt')) {
        result = parseCSV(text);
      } else {
        // sniff content
        if (text.includes('<kml') || text.includes('<Placemark>')) {
          result = parseAnyKML(text);
        } else {
          result = parseCSV(text);
        }
      }
      document.getElementById('file-name').textContent = file.name;
      renderTrack(result.points, result.tailNumber);
    } catch (err) {
      document.getElementById('spinner').classList.remove('visible');
      document.getElementById('empty-title').textContent = 'Could not read this file';
      document.getElementById('empty-text').style.display = '';
      document.getElementById('empty-text').textContent =
        'Upload a ForeFlight/Garmin KML track log, a G1000-format CSV, or a FlightRadar24-style CSV.';
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
    }
  };
  reader.onerror = () => {
    document.getElementById('spinner').classList.remove('visible');
    errorEl.textContent = 'Could not read the file from disk.';
    errorEl.style.display = 'block';
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
document.getElementById('file-input-2').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// Drag & drop onto map
const viewerViewEl = document.getElementById('viewer-view');
['dragover','drop'].forEach(evt => {
  viewerViewEl.addEventListener(evt, e => e.preventDefault());
});
viewerViewEl.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
</script>
